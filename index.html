  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;

    .iframe-container {
      position: relative;
      width: 100%;
      height: 100vh;

    iframe {
      width: 100%;

    }
    .loader {
      position: absolute;

      font-size: 1.2rem;
      color: #666;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <div class="loader" id="loader">Loading app...</div>
    <iframe 
      src="https://script.google.com/macros/s/AKfycby4CfPFMNf5_UIjypgFis5YUgx3W1aBy-9VByhBIP6pmDZupwgpi6HZUy5XNy56aa-3/exec" 
      title="SD N Tanjungsari"
      onload="document.getElementById('loader').style.display='none';"
      allowfullscreen>
    </iframe>
  </div>
</body>
