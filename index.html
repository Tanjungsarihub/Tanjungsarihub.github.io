<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDN Tanjungsari</title>
  <link rel="icon" href="https://www.kemendikdasmen.go.id/web/image/res.company/1/favicon/unique_id" type="image/x-icon">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #f4f4f4; /* Tambahkan warna latar agar terlihat kontras */
      font-family: sans-serif;
    }
    .iframe-container {
      position: relative;
      width: 90%;          /* Mengurangi lebar menjadi 90% */
      max-width: 1000px;   /* Memberikan batas maksimal lebar */
      height: 90vh;        /* Mengurangi tinggi menjadi 90% dari viewport */
      margin: 5vh auto;    /* Memberikan jarak atas-bawah dan membuat posisi di tengah */
      box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Menambahkan bayangan agar terlihat rapi */
      border-radius: 8px;  /* Membuat sudut melengkung */
      overflow: hidden;    /* Memastikan konten di dalam tidak keluar dari border-radius */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <div class="loader" id="loader">Loading app...</div>
    <iframe 
      src="https://script.google.com/macros/s/AKfycbzh4627bCkNGGRALIGCTdiG-W488dvehJKMEWTDJojt40ziT8fu0GHgq20fwtg-lJed/exec" 
      title="SD N Tanjungsari"
      onload="document.getElementById('loader').style.display='none';"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>

</body>
</html>
